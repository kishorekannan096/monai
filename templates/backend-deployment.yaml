apiVersion: apps/v1
kind: Deployment
metadata:
  name: monai-backend
  labels:
    app: monai-backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: monai-backend
  template:
    metadata:
      labels:
        app: monai-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: CKPT_PATH
              value: {{ .Values.backend.env.ckptPath }}
            - name: VAL_LOADER_PATH
              value: {{ .Values.backend.env.valLoaderPath }}
            - name: TEMP_DIR
              value: {{ .Values.backend.env.tempDir }}
          resources:
{{ toYaml .Values.backend.resources | indent 12 }}
          volumeMounts:
            - name: outputs-volume
              mountPath: /app/outputs
      volumes:
        - name: outputs-volume
          persistentVolumeClaim:
            claimName: monai-outputs-pvc
